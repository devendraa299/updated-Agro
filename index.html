      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,te,ta,kn,mr,bn,gu,ml,pa,ur,es,fr,de,zh-CN,ja,ru,ar',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');

      function hideGoogleTranslateBanner() {
        var banner = document.querySelector('.goog-te-banner-frame');
        if (banner) {
          banner.style.setProperty('display', 'none', 'important');
          banner.style.setProperty('visibility', 'hidden', 'important');
        }
        document.body.style.setProperty('top', '0px', 'important');
      }

      var observer = new MutationObserver(hideGoogleTranslateBanner);
      window.onload = function() {
        observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
        setInterval(hideGoogleTranslateBanner, 500); // Fail-safe to aggressively clear it whenever it tries to pop up
      };
    </script>
